<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Compressor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Image Compressor</h1>

  <input type="file" id="upload" accept="image/*">

  <label>Compression Quality</label>
  <input type="range" id="quality" min="0.1" max="1" step="0.1" value="0.7">

  <button id="compressBtn">Compress Image</button>

  <div class="preview">
    <div>
      <h3>Original</h3>
      <img id="originalPreview">
      <p id="originalSize"></p>
    </div>

    <div>
      <h3>Compressed</h3>
      <img id="compressedPreview">
      <p id="compressedSize"></p>
      <a id="downloadBtn" download="compressed-image.jpg">Download</a>
    </div>
  </div>

  <p id="percentage"></p>
</div>

<script src="script.js"></script>
</body>
</html>
