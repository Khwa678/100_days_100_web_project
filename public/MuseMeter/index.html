<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuseMeter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>MuseMeter</h1>
        <p class="tagline">Reflect. Rate. Relive the art that moves you.</p>

        <div class="form-section">
            <input type="text" id="title" placeholder="Media Title">

            <select id="category">
                <option value="Book">Book</option>
                <option value="Movie">Movie</option>
                <option value="Music">Music</option>
                <option value="Poem">Poem</option>
            </select>

            <select id="rating">
                <option value="1">1 ⭐</option>
                <option value="2">2 ⭐</option>
                <option value="3">3 ⭐</option>
                <option value="4">4 ⭐</option>
                <option value="5">5 ⭐</option>
            </select>

            <textarea id="notes" placeholder="Write your review..."></textarea>

            <button onclick="addEntry()">Add Entry</button>
        </div>

        <div class="controls">
            <input
                type="text"
                id="search"
                placeholder="Search..."
                onkeyup="renderEntries()"
            >

            <select id="filter" onchange="renderEntries()">
                <option value="All">All Categories</option>
                <option value="Book">Book</option>
                <option value="Movie">Movie</option>
                <option value="Music">Music</option>
                <option value="Poem">Poem</option>
            </select>
        </div>

        <div id="entries"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
