<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    #bg{
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

.container{
  position:relative;
  z-index:10;
}

body{
  background:#080b18;
}
  </style>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium BMI Calculator</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <!-- Animated Background -->
    <canvas id="bg"></canvas>

    <div class="container">

        <!-- Left Panel -->
        <div class="calculator-card glass">

            <div class="card-header">
                <h1>BMI Calculator</h1>
                <p>
                    Calculate your Body Mass Index and discover your healthy
                    weight range instantly.
                </p>
            </div>

            <div class="form-grid">

                <!-- Height -->
                <div class="input-group">
                    <label>Height Unit</label>

                    <select id="height-unit">
                        <option value="cm">Centimetres</option>
                        <option value="feet">Feet / Inches</option>
                    </select>
                </div>

                <div class="input-group">
                    <label id="height-lbl">Height (cm)</label>

                    <input
                        type="text"
                        id="height"
                        placeholder="e.g. 170"
                    >
                </div>

                <!-- Weight -->
                <div class="input-group">
                    <label>Weight Unit</label>

                    <select id="weight-unit">
                        <option value="kg">Kilograms</option>
                        <option value="lb">Pounds</option>
                    </select>
                </div>

                <div class="input-group">
                    <label id="weight-lbl">Weight (kg)</label>

                    <input
                        type="number"
                        id="weight"
                        placeholder="e.g. 70"
                    >
                </div>

            </div>

            <div
                id="error-msg"
                class="error-box hidden"
            ></div>

            <div class="button-group">
                <button id="btn" class="primary-btn">
                    Calculate BMI
                </button>
            </div>

            <!-- Result -->
            <div
                id="results"
                class="result-card glass hidden"
            >

                <div class="gauge-section">

                    <div class="gauge-container">

                        <div class="gauge">

                            <div class="gauge-cover">

                                <span id="bmi-val">
                                    --
                                </span>

                                <small>
                                    BMI Score
                                </small>

                            </div>

                        </div>

                    </div>

                </div>

                <div class="result-details">

                    <div
                        id="cat-badge"
                        class="category-badge"
                    ></div>

                    <h2 id="healthy-range">
                        --
                    </h2>

                    <p id="tip-text">
                        --
                    </p>

                </div>

            </div>

            <!-- BMI Range -->
            <div
                id="range-vis"
                class="range-section glass hidden"
            >

                <div
                    style="
                        height:20px;
                        background:linear-gradient(
                        to right,
                        #4f6ef7,
                        #3ecf8e,
                        #e8a838,
                        #e05c5c
                        );
                        border-radius:20px;
                        position:relative;
                    "
                >

                    <div
                        id="bmi-ptr"
                        style="
                            width:16px;
                            height:16px;
                            border-radius:50%;
                            background:white;
                            position:absolute;
                            top:2px;
                            left:0%;
                            transition:.4s;
                        "
                    ></div>

                </div>

            </div>

        </div>

        <!-- Right Panel -->

        <div class="recommendation-card">

            <div class="recommendation-box glass">

                <div class="box-header">
                    <span>📊</span>
                    <h3>BMI Categories</h3>
                </div>

                <ul>
                    <li>Underweight: Below 18.5</li>
                    <li>Normal: 18.5 - 24.9</li>
                    <li>Overweight: 25 - 29.9</li>
                    <li>Obese: 30+</li>
                </ul>

            </div>

            <div class="chart-section glass">

                <div class="section-header">
                    <h2>BMI History</h2>
                </div>

                <div class="chart-wrapper">
                    <canvas id="bmiChart"></canvas>
                </div>

            </div>

        </div>

    </div>

    <footer class="footer">
        BMI Calculator • Built with HTML, CSS & JavaScript
    </footer>

    <script src="script.js"></script>

</body>
</html>
