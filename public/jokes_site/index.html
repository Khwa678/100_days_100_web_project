<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roast My Code - Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<style>
    * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    /* Remove after debugging */
    outline: 1px solid red;
}

html,
body,
#root {
    width: 100%;
    max-width: 100%;
    overflow-x: hidden;
    margin: 0;
    padding: 0;
}

body {
    background-color: #0d0d0d;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Fira Code', monospace;
    padding: 20px;
    overflow-x: hidden;
}

.terminal-container {
    width: 100%;
    max-width: 900px;
    height: 600px;
    background-color: #1e1e1e;
    border-radius: 10px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.terminal-header {
    background-color: #323233;
    padding: 10px 15px;
    display: flex;
    align-items: center;
    border-bottom: 1px solid #111;
    position: relative;
}

.window-controls {
    display: flex;
    gap: 8px;
    position: absolute;
    left: 15px;
}

.control {
    width: 12px;
    height: 12px;
    border-radius: 50%;
}

.red {
    background-color: #ff5f56;
}

.yellow {
    background-color: #ffbd2e;
}

.green {
    background-color: #27c93f;
}

.window-title {
    flex: 1;
    text-align: center;
    color: #a9a9a9;
    font-size: 13px;
    font-weight: 500;
}

.terminal-body {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    overflow-x: hidden;
    font-size: 15px;
    line-height: 1.6;
    color: #e0e0e0;
    word-wrap: break-word;
    overflow-wrap: break-word;
}

.terminal-body::-webkit-scrollbar {
    width: 8px;
}

.terminal-body::-webkit-scrollbar-thumb {
    background: #444;
    border-radius: 4px;
}

.input-line {
    display: flex;
    align-items: center;
    margin-top: 5px;
}

.prompt {
    color: #27c93f;
    font-weight: bold;
    margin-right: 10px;
    white-space: pre;
}

#commandInput {
    flex: 1;
    background: transparent;
    border: none;
    color: #e0e0e0;
    font-family: 'Fira Code', monospace;
    font-size: 15px;
    outline: none;
    caret-color: #e0e0e0;
    min-width: 0;
}

.system-msg {
    color: #a9a9a9;
}

.highlight {
    color: #ffbd2e;
}

.error-msg {
    color: #ff5f56;
}

.joke-setup {
    color: #58a6ff;
}

.joke-punchline {
    color: #27c93f;
    font-weight: bold;
}

.user-cmd {
    color: #e0e0e0;
}

.typing-indicator {
    color: #ffbd2e;
    animation: blink 1s infinite;
}

@keyframes blink {
    0%,
    100% {
        opacity: 1;
    }

    50% {
        opacity: 0;
    }
}
.project-back-button {
    max-width: calc(100vw - 40px);
    box-sizing: border-box;
}
.terminal-container {
    width: 100%;
    max-width: 900px;
    height: 600px;
}
.terminal-container {
    width: min(900px, 100%);
    height: 600px;
    max-width: 100%;
}
#outputArea,
#outputArea div,
.prompt,
.window-title {
    overflow-wrap: anywhere;
    word-break: break-word;
}

body {
    overflow-x: hidden !important;
}

.terminal-container {
    overflow-x: hidden;
}

#outputArea div {
    white-space: pre-wrap;
    word-break: break-all;
    overflow-wrap: anywhere;
}
.system-msg,
.highlight,
.error-msg,
.user-cmd {
    white-space: pre-wrap;
    word-break: break-all;
    overflow-wrap: anywhere;
}
.terminal-body {
    overflow-x: auto;
}
</style>
<body>
<a href="/" class="project-back-button" style="position:fixed;left:18px;top:18px;padding:8px 16px;border-radius:8px;background:#1e293b;color:#3b82f6;border:1px solid #3b82f6;text-decoration:none;z-index:9999;font-weight:700;font-family:Inter, system-ui, sans-serif;transition:all 0.2s ease;" onmouseover="this.style.background='#3b82f6';this.style.color='#fff'" onmouseout="this.style.background='#1e293b';this.style.color='#3b82f6'">← Back to Home</a>

    <div class="terminal-container">
        <div class="terminal-header">
            <div class="window-controls">
                <span class="control red"></span>
                <span class="control yellow"></span>
                <span class="control green"></span>
            </div>
            <div class="window-title">bash -- user@macbook -- 80x24</div>
        </div>

        <div class="terminal-body" id="terminalBody">
            <div id="outputArea">
                <div class="system-msg">Welcome to RoastOS v1.0.0</div>
                <div class="system-msg">Type <span class="highlight">'help'</span> to see a list of available commands.
                </div>
                <br>
            </div>

            <div class="input-line">
                <span class="prompt">user@macbook ~ % </span>
                <input type="text" id="commandInput" autocomplete="off" spellcheck="false" autofocus>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
