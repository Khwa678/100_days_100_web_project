<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>📋 Kanban Board</h1>

    <div class="controls">
        <button id="addTaskBtn">+ Add Task</button>
        <button id="themeBtn">🌙 Dark Mode</button>
    </div>
</header>

<div class="board">

    <div class="column" data-column="todo">
        <h2>To Do</h2>
        <div class="task-list" id="todo"></div>
    </div>

    <div class="column" data-column="progress">
        <h2>In Progress</h2>
        <div class="task-list" id="progress"></div>
    </div>

    <div class="column" data-column="review">
        <h2>Review</h2>
        <div class="task-list" id="review"></div>
    </div>

    <div class="column" data-column="completed">
        <h2>Completed</h2>
        <div class="task-list" id="completed"></div>
    </div>

</div>

<div id="taskModal" class="modal">
    <div class="modal-content">
        <h2>Add Task</h2>

        <input type="text" id="taskTitle" placeholder="Task Title">

        <select id="priority">
            <option value="Low">Low Priority</option>
            <option value="Medium">Medium Priority</option>
            <option value="High">High Priority</option>
        </select>

        <button id="saveTask">Save Task</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
