<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Flexbox Showcase</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    padding:40px;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

h1{
    text-align:center;
    margin-bottom:40px;
    font-size:2.8rem;
    background:linear-gradient(90deg,#38bdf8,#a855f7);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.section{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:18px;
    padding:25px;
    margin-bottom:30px;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

.section-title{
    margin-bottom:15px;
    color:#38bdf8;
    font-weight:600;
}

.flex{
    display:flex;
}

.card-blue{
    background:linear-gradient(135deg,#38bdf8,#2563eb);
    padding:20px;
    border-radius:12px;
    color:white;
    font-weight:600;
    text-align:center;
}

.card-pink{
    background:linear-gradient(135deg,#ec4899,#db2777);
    padding:20px;
    border-radius:12px;
    color:white;
    font-weight:600;
    text-align:center;
}

.gap{
    gap:15px;
}

.demo-box{
    height:120px;
    border:2px dashed rgba(255,255,255,0.2);
    border-radius:15px;
    padding:15px;
}

.fixed{
    width:120px;
}

.flex1{
    flex:1;
}

.flex2{
    flex:2;
}

.center{
    justify-content:center;
    align-items:center;
}

.space-between{
    justify-content:space-between;
    align-items:center;
}

p{
    margin-top:10px;
    font-size:14px;
}
</style>
</head>

<body>

<h1>🚀 Flexbox Layout Showcase</h1>

<div class="section">
    <h3 class="section-title">Basic Flex Layout</h3>
    <div class="flex gap">
        <div class="card-blue">
            Div 1 Text
        </div>

        <div class="card-pink">
            Div 2
            <p>Additional Content</p>
        </div>
    </div>
</div>

<div class="section">
    <h3 class="section-title">Fixed Width + Flexible Width</h3>

    <div class="flex gap">
        <div class="card-blue fixed">120px</div>
        <div class="card-pink flex1">Flex: 1</div>
    </div>
</div>

<div class="section">
    <h3 class="section-title">Flex Growth Example</h3>

    <div class="flex gap">
        <div class="card-blue flex1">Flex: 1</div>
        <div class="card-pink fixed">120px</div>
        <div class="card-blue flex2">Flex: 2</div>
    </div>
</div>

<div class="section">
    <h3 class="section-title">Centered Items</h3>

    <div class="flex center demo-box gap">
        <div class="card-blue fixed">100px</div>
        <div class="card-pink fixed">100px</div>
        <div class="card-blue fixed">100px</div>
    </div>
</div>

<div class="section">
    <h3 class="section-title">Space Between</h3>

    <div class="flex space-between demo-box">
        <div class="card-blue fixed">100px</div>
        <div class="card-pink fixed">100px</div>
        <div class="card-blue fixed">100px</div>
    </div>
</div>

</body>
</html>
