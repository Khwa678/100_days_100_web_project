<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        /* Global Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html,
body {
    width: 100%;
    max-width: 100%;
    overflow-x: hidden;
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f6f9;
    color: #222;
}

/* Page Container */
body {
    padding: 20px;
}

/* Heading */
h2 {
    margin-bottom: 15px;
    color: #1f2937;
}

/* Stats Section */
div:first-of-type {
    margin-bottom: 20px;
    font-size: 16px;
}

/* Kanban Board */
.kanban-board {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    width: 100%;
    margin-top: 20px;
}

/* Columns */
.kanban-column {
    flex: 1 1 300px;
    min-width: 280px;
    max-width: 100%;
    background: white;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    padding: 15px;
    min-height: 300px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.kanban-column h3 {
    margin-bottom: 15px;
    color: #111827;
}

/* Cards */
.job-card {
    background: #eff6ff;
    border: 1px solid #3b82f6;
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 10px;
    cursor: grab;
    transition: 0.2s;
}

.job-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.job-card h4 {
    font-size: 15px;
    word-wrap: break-word;
    overflow-wrap: break-word;
}

/* Diagnostics */
h4 {
    margin-top: 30px;
    margin-bottom: 10px;
}

/* Log Container */
#system-log {
    width: 100%;
    max-width: 100%;
    background: #111827;
    color: #00ff00;
    padding: 15px;
    border-radius: 8px;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
    overflow-wrap: anywhere;
    font-size: 14px;
    line-height: 1.5;
}

/* Responsive */
@media (max-width: 768px) {
    .kanban-board {
        flex-direction: column;
    }

    .kanban-column {
        width: 100%;
        min-width: 100%;
    }

    h2 {
        font-size: 22px;
    }
}
    </style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8">
    <title>Advanced Kanban Pipeline Systems Engine</title>
</head>

<body>
    <h2>Advanced Job Tracking & Analytical Workspace Engine</h2>

    <div>
        <strong>Total Active Leads: </strong><span id="stat-total">0</span> |
        <strong>Interview Conversion Rate: </strong><span id="stat-rate">0%</span>
    </div>

    <div style="display: flex; gap: 20px; margin-top: 20px;">
        <div class="kanban-column" data-stage="Applied"
            style="border: 1px solid #aaa; padding: 10px; width: 200px; min-height: 200px;">
            <h3>Applied Column</h3>
            <div class="job-card" draggable="true" data-id="job_001"
                style="border: 1px solid blue; padding: 5px; margin: 5px; cursor: move;">
                <h4>Google - Frontend Engineer</h4>
            </div>
        </div>

        <div class="kanban-column" data-stage="Interviewing"
            style="border: 1px solid #aaa; padding: 10px; width: 200px; min-height: 200px;">
            <h3>Interviewing Column</h3>
        </div>
    </div>

    <h4>Global System Diagnostics Streams:</h4>
    <pre id="system-log" style="background: #222; color: #00ff00; padding: 10px;">Pipeline Interface Ready...</pre>

    <script type="module" src="main.js"></script>
</body>

</html>
